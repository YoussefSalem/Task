include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore # Freezed/json_serializable generated code
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.mocks.dart"

linter:
  rules:
    - prefer_single_quotes
    - require_trailing_commas
    - always_declare_return_types
    - prefer_const_constructors
    - prefer_final_locals
    - unawaited_futures
    - avoid_print
