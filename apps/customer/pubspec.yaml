name: customer
description: "Task — Customer app (v1)."
publish_to: none
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared workspace packages
  task_core:
  task_design:
  task_domain:
  task_data:

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Localization & persistence
  intl: any
  shared_preferences: ^2.3.2

  # AI assistant (Groq, OpenAI-compatible)
  http: ^1.2.0

  # Web platform interop (Google Maps embed)
  web: ^1.1.0

  # Firebase bootstrap (App Check is mandatory on all DB/API calls — PRD §1.1)
  firebase_core: ^3.6.0
  firebase_app_check: ^0.3.1
  firebase_auth: ^5.3.0
  pointer_interceptor: ^0.10.1+2
  image_picker: ^1.2.2
  livekit_client: ^2.8.1
  cloud_functions: ^5.6.2
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  google_fonts: ^6.2.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
