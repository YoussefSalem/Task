name: task

packages:
  - packages/*
  - apps/*

command:
  bootstrap:
    # Native pub workspace handles path resolution; melos drives scripts.
    runPubGetInParallel: true

scripts:
  analyze:
    run: dart analyze --fatal-infos --fatal-warnings .
    description: Static analysis across the whole workspace.

  format:
    run: dart format --set-exit-if-changed .
    description: Verify formatting across the workspace.

  test:
    run: flutter test
    exec:
      concurrency: 1
    packageFilters:
      dirExists: test
    description: Run tests in every package that has a test/ directory.

  gen:
    run: dart run build_runner build --delete-conflicting-outputs
    exec:
      concurrency: 1
    packageFilters:
      dependsOn: build_runner
    description: Run code generation (Freezed/json_serializable/Drift) where configured.
